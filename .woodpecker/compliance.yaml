# License compliance + Trivy filesystem scan (deps, secrets, misconfig).
# Runs in parallel with quality.

when:
  - event: [push, pull_request, manual]

steps:
  license:
    image: code.olsen.cloud/ci/mise:latest
    commands:
      - mise install
      - task ci:compliance

  # Trivy scan disabled while we triage the existing CVE backlog. This is a
  # static-built site (no runtime exposure of deps) so it's not blocking.
  # Re-enable once the noisy advisories are addressed or filtered.
  # scan:
  #   image: code.olsen.cloud/ci/trivy:latest
  #   settings:
  #     target: fs
  #     severity: HIGH,CRITICAL
  #     exit_code: 1
  #     ignore_unfixed: true
  #     skip_dirs: node_modules
  #   depends_on: []
