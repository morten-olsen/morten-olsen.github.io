# Build the Astro site and publish to the homelab pages server at
# https://mortenolsen.pro/. Apex domain, so host is set explicitly.
#
# Auth is a bearer token for the pages admin API (pages-admin.olsen.cloud)
# — no longer routed through Forgejo, so source repo path and host are
# fully decoupled.
#
# NOTE: The legacy GitHub Pages workflow at .github/workflows/release.yaml
# still publishes to morten-olsen.github.io. Both run in parallel until
# the DNS record for mortenolsen.pro is cut over to the homelab.

when:
  - event: [push, manual]
    branch: main

# Gate the deploy on quality + compliance — without this, the three
# workflows run in parallel and a failed lint/typecheck/scan wouldn't
# block publish.
depends_on:
  - quality
  - compliance

steps:
  build:
    image: code.olsen.cloud/ci/mise:latest
    environment:
      SITE_URL: https://mortenolsen.pro
    commands:
      - mise install
      - task build

  publish:
    image: code.olsen.cloud/ci/pages-deploy:latest
    settings:
      host: mortenolsen.pro
      dir: ./dist
      token:
        from_secret: pages_admin_token
    depends_on: [build]
