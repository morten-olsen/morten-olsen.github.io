# Self-hosted Renovate scoped to this repo. Trigger via cron in the
# Woodpecker UI (e.g. weekly Sunday 03:00 UTC).
#
# Renovate auto-detects mise.toml, package.json, and other manifests.
# Tune via renovate.json at the repo root.

when:
  - event: [cron, manual]

steps:
  renovate:
    image: code.olsen.cloud/ci/renovate:latest
    settings:
      token:
        from_secret: renovate_forgejo_token
