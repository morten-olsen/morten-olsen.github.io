name: Deploy Astro site to Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  BUILD_PATH: "./"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: "10.18"
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: "pnpm"
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Install dependencies
        run: "pnpm install"
        working-directory: ${{ env.BUILD_PATH }}
      - name: Build with Astro
        run: |
          echo "Setting SITE_URL to $SITE_URL"
          pnpm astro build
        env:
          SITE_URL: "${{ steps.pages.outputs.origin }}/${{ steps.pages.outputs.base_path }}"
        working-directory: ${{ env.BUILD_PATH }}
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_PATH }}/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  update-profile-readme:
    name: Update GitHub Profile README
    runs-on: ubuntu-latest
    concurrency:
      group: "profile-readme"
      cancel-in-progress: true
    steps:
      - name: Checkout portfolio
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: "10.18"
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Checkout profile repo
        uses: actions/checkout@v4
        with:
          repository: morten-olsen/morten-olsen
          token: ${{ secrets.GH_README_TOKEN }}
          path: profile-repo
      - name: Generate README and SVG cards
        run: npx tsx scripts/generate-readme.ts --out-dir profile-repo > profile-repo/README.md
      - name: Push to profile repo
        run: |
          cd profile-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md images/
          git diff --cached --quiet || (git commit -m "Update profile README from portfolio site" && git push)
