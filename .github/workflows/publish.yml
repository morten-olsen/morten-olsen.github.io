name: Publish articles to external platforms

on:
  schedule:
    # Runs daily at 08:00 UTC. publishOn dates in frontmatter control actual cadence.
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log only, do not publish or update tracking)'
        type: boolean
        default: false

permissions:
  contents: write  # needed to commit the updated tracking file

concurrency:
  group: publish
  cancel-in-progress: false  # never cancel mid-publish

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: "10.18"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Publish articles
        if: ${{ !inputs.dry_run }}
        run: pnpm publish:articles
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          HASHNODE_API_KEY: ${{ secrets.HASHNODE_API_KEY }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}
          SITE_URL: https://mortenolsen.pro

      - name: Dry run (log only)
        if: ${{ inputs.dry_run }}
        run: pnpm publish:articles
        env:
          # No API keys set intentionally — will log "no platforms configured"
          SITE_URL: https://mortenolsen.pro

      - name: Commit updated tracking file
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/published.json
          git diff --staged --quiet || git commit -m "chore: update publish tracking [skip ci]"
          git push origin ${{ github.ref_name }}
